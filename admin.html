<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — KF Calendar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d14;color:#e0e0f0;min-height:100vh;display:flex;flex-direction:column}
/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#13131f;border-bottom:1px solid #22223a;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700;color:#c4a0f0}
.topbar-r{display:flex;align-items:center;gap:16px;font-size:12px;color:#666}
/* tabs */
.tabs{display:flex;background:#13131f;border-bottom:1px solid #22223a;flex-shrink:0;overflow-x:auto}
.tab{padding:11px 20px;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab.on{color:#c4a0f0;border-bottom-color:#c4a0f0}
.tab:hover:not(.on){color:#aaa}
.badge-count{display:inline-block;background:#e06030;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:5px;font-weight:700}
/* container */
.content{flex:1;overflow-y:auto;padding:20px 24px;max-width:1100px;width:100%;margin:0 auto}
/* calendar */
.cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-nav button{background:#1e1e30;border:1px solid #2a2a40;color:#ccc;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
.cal-nav button:hover{background:#2a2a40}
.cal-month-label{font-size:16px;font-weight:700;color:#e0e0f0;min-width:140px;text-align:center}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.fchip{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.fchip.crawl{border-color:#306090;color:#70a0d0}
.fchip.crawl.on{background:#306090;color:#fff}
.fchip.manual{border-color:#306050;color:#60d090}
.fchip.manual.on{background:#306050;color:#fff}
.fchip.fan{border-color:#805020;color:#f0a040}
.fchip.fan.on{background:#805020;color:#fff}
.fchip.pending{border-color:#8040a0;color:#d080f0;border-style:dashed}
.fchip.pending.on{background:#5a2080;border-style:solid;color:#fff}
/* cal grid */
.cal-grid-wrap{overflow-x:auto}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:90px;gap:1px;background:#22223a;border-radius:10px;overflow:hidden;min-width:560px}
.cal-dow{background:#13131f;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:#666;letter-spacing:.05em}
.cal-cell{background:#1a1a28;height:90px;min-height:90px;max-height:90px;padding:6px 4px 4px;cursor:default;transition:background .1s;position:relative;overflow:hidden;box-sizing:border-box}
.cal-cell.other{background:#14141f}
.cal-cell.today{background:#1e1a30}
.cal-cell:hover{background:#202030}
.cal-num{font-size:11px;font-weight:700;color:#555;margin-bottom:4px}
.cal-cell.today .cal-num{color:#c4a0f0;background:#3a2060;border-radius:10px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-pill{border-radius:4px;padding:2px 5px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;display:block}
.cal-pill:hover{filter:brightness(1.2)}
.cal-more{font-size:10px;color:#666;padding:1px 4px;cursor:pointer}
.cal-more:hover{color:#aaa}
/* source colors */
.src-crawl{background:#1a3050;color:#70a0d0}
.src-manual{background:#1a3028;color:#60d090}
.src-fan{background:#3a2810;color:#f0a040}
.src-pending{background:#3a1a40;color:#d080f0;border:1px dashed #8040a0}
/* event detail panel */
.detail-panel{background:#1a1a28;border:1px solid #2a2a40;border-radius:10px;padding:18px;margin-bottom:16px;display:none}
.detail-panel.open{display:block}
.detail-title{font-size:15px;font-weight:700;margin-bottom:8px}
.detail-meta{font-size:12px;color:#888;line-height:1.8;margin-bottom:14px}
.detail-actions{display:flex;gap:8px}
/* list cards */
.card{background:#1a1a28;border:1px solid #22223a;border-radius:10px;padding:16px;margin-bottom:10px}
.card-row{display:flex;align-items:flex-start;gap:12px;justify-content:space-between}
.card-info{flex:1;min-width:0}
.card-badges{margin-bottom:6px;display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.badge-bts{background:#3a1060;color:#d090f0}
.badge-enhypen{background:#402010;color:#f0a060}
.badge-seventeen{background:#20184a;color:#a090e0}
.badge-crawl{background:#1a3050;color:#70a0d0}
.badge-manual{background:#1a3028;color:#60d090}
.badge-fan{background:#3a2810;color:#f0a040}
.badge-type{background:#222233;color:#999}
.badge-pending{background:#3a2800;color:#f0a040}
.badge-approved{background:#0a2818;color:#50c080}
.badge-rejected{background:#2a0a0a;color:#d06060}
.card-name{font-size:14px;font-weight:700;margin-bottom:4px;color:#e0e0f0;word-break:break-word}
.card-meta{font-size:12px;color:#777;line-height:1.6}
.card-meta a{color:#6080c0}
.card-actions{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;align-items:flex-start}
/* buttons */
button{border:none;border-radius:7px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;transition:filter .15s}
button:hover{filter:brightness(1.15)}
.btn-approve{background:#1a4a2a;color:#60d090}
.btn-reject{background:#4a1a1a;color:#d06060}
.btn-edit{background:#2a2a4a;color:#a0a0d0}
.btn-delete{background:#3a1a1a;color:#c06060}
.btn-primary{background:#3a2060;color:#c4a0f0;padding:9px 18px;font-size:13px}
.btn-sm{padding:5px 10px;font-size:11px}
.empty{text-align:center;color:#444;padding:48px;font-size:14px}
/* form */
.form-card{background:#1a1a28;border:1px solid #22223a;border-radius:10px;padding:20px;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-full{grid-column:1/-1}
label{font-size:11px;color:#777;display:block;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;padding:9px 11px;background:#0d0d14;border:1px solid #2a2a40;border-radius:7px;color:#e0e0f0;font-size:13px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#6040a0}
select option{background:#0d0d14}
/* edit inline */
.edit-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.edit-row label{min-width:70px;margin:0;font-size:11px;color:#666}
.edit-row input,.edit-row select{flex:1;padding:6px 9px;font-size:12px}
/* section header */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-hdr h2{font-size:14px;font-weight:700;color:#c4a0f0}
/* feedback */
.stars{color:#f0b040;font-size:16px;letter-spacing:2px}
/* filter bar */
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar select{width:auto;padding:6px 10px;font-size:12px}
</style>
</head>
<body>

<div class="topbar">
  <h1>KF Calendar — Admin</h1>
  <div class="topbar-r">
    <span id="topbar-stats">Loading…</span>
  </div>
</div>

<div class="tabs">
  <div class="tab on"  onclick="showTab('calendar')">📅 Calendar</div>
  <div class="tab"     onclick="showTab('lineups')">🎤 Lineups</div>
  <div class="tab"     onclick="showTab('feedback')">Feedback</div>
</div>

<div class="content">

  <!-- ═══════════════ CALENDAR TAB ═══════════════ -->
  <div id="tab-calendar">
    <div class="cal-toolbar">
      <div class="cal-nav">
        <button onclick="calMove(-1)">‹</button>
        <div class="cal-month-label" id="cal-label"></div>
        <button onclick="calMove(1)">›</button>
      </div>
      <div class="filter-chips" style="align-items:center">
        <input id="group-search" type="text" placeholder="Search groups (e.g. bts, ive...)"
          style="padding:4px 10px;border-radius:16px;font-size:12px;background:#1a1a28;border:1.5px solid #2a2a40;color:#e0e0f0;width:180px;outline:none"
          oninput="filterGroupInput(this.value)">
      </div>
    </div>

    <!-- event detail panel (click pill to open) -->
    <div class="detail-panel" id="detail-panel">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div class="detail-title" id="dp-name"></div>
        <button id="dp-close-btn" onclick="document.getElementById('detail-panel').classList.remove('open')" style="background:none;border:none;color:#666;font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>
      </div>
      <div class="detail-meta" id="dp-meta"></div>
      <!-- 인라인 편집 폼 -->
      <div id="dp-edit" style="margin-top:14px;border-top:1px solid #2a2a40;padding-top:14px">
        <div style="font-size:11px;color:#777;margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em" id="dp-form-title">Edit Lineup</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
          <div>
            <label style="font-size:10px;color:#666;display:block;margin-bottom:3px">Show</label>
            <select id="dp-show" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:6px 8px;border-radius:6px;font-size:12px">
              <option value="inkigayo">Inkigayo</option>
              <option value="music_bank">Music Bank</option>
              <option value="mcountdown">M Countdown</option>
              <option value="show_champion">Show Champion</option>
              <option value="the_show">The Show</option>
              <option value="music_core">Music Core</option>
            </select>
          </div>
          <div>
            <label style="font-size:10px;color:#666;display:block;margin-bottom:3px">Air Date</label>
            <input id="dp-date" type="date" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:6px 8px;border-radius:6px;font-size:12px">
          </div>
          <div>
            <label style="font-size:10px;color:#666;display:block;margin-bottom:3px">Episode</label>
            <input id="dp-episode" type="text" placeholder="optional" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:6px 8px;border-radius:6px;font-size:12px">
          </div>
        </div>
        <div style="margin-bottom:10px">
          <label style="font-size:10px;color:#666;display:block;margin-bottom:3px">Artists (one per line or comma-separated)</label>
          <textarea id="dp-artists" rows="4" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:8px;border-radius:6px;font-size:12px;resize:vertical;line-height:1.5"></textarea>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="submitDetailForm()" style="background:#9040d0;border:none;color:#fff;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer" id="dp-save-btn">Save</button>
          <button onclick="document.getElementById('detail-panel').classList.remove('open')" style="background:#222;border:none;color:#888;padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer">Cancel</button>
          <button id="dp-delete-btn" onclick="deleteDetailEvent()" style="background:#3a1010;border:1px solid #6a2020;color:#f08080;padding:7px 14px;border-radius:7px;font-size:12px;cursor:pointer;margin-left:auto;display:none">Delete</button>
          <span id="dp-msg" style="font-size:12px;color:#888"></span>
        </div>
      </div>
    </div>

    <div class="cal-grid-wrap">
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- ═══════════════ 공방 일정 TAB ═══════════════ -->
  <div id="tab-lineups" style="display:none">
    <div class="sec-hdr" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:16px;font-weight:700;color:#c4a0f0">Music Show Lineups</h2>
      <div style="display:flex;gap:8px">
        <button onclick="syncNaver()" style="background:#1a6b3a;border:none;color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">
          🔄 Sync All Shows (Naver)
        </button>
      </div>
    </div>

    <!-- 수동 입력 폼 -->
    <div id="lf-form-wrap" style="background:#13131f;border:1px solid #22223a;border-radius:12px;padding:20px;margin-bottom:24px">
      <input type="hidden" id="lf-edit-id" value="">
      <h3 id="lf-form-title" style="font-size:13px;font-weight:700;color:#aaa;margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em">Manual Entry (non-Music Core shows)</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px">
        <div>
          <label style="font-size:11px;color:#666;display:block;margin-bottom:4px">Show</label>
          <select id="lf-show" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:8px 10px;border-radius:8px;font-size:13px">
            <option value="inkigayo">Inkigayo</option>
            <option value="music_bank">Music Bank</option>
            <option value="mcountdown">M Countdown</option>
            <option value="show_champion">Show Champion</option>
            <option value="the_show">The Show</option>
            <option value="music_core">Music Core</option>
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:#666;display:block;margin-bottom:4px">Air date</label>
          <input id="lf-date" type="date" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:8px 10px;border-radius:8px;font-size:13px">
        </div>
        <div>
          <label style="font-size:11px;color:#666;display:block;margin-bottom:4px">Episode number (optional)</label>
          <input id="lf-episode" type="text" placeholder="e.g. 1299" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:8px 10px;border-radius:8px;font-size:13px">
        </div>
      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:11px;color:#666;display:block;margin-bottom:6px">Artists (separate with line breaks or dots)</label>
        <textarea id="lf-artists" rows="4" placeholder="e.g.&#10;BTS&#10;IVE&#10;LE SSERAFIM&#10;aespa" style="width:100%;background:#1e1e30;border:1px solid #2a2a40;color:#e0e0f0;padding:10px;border-radius:8px;font-size:13px;resize:vertical;line-height:1.5"></textarea>
        <div style="font-size:11px;color:#555;margin-top:4px">You can paste the lineup copied from Naver as-is.</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="submitLineup()" id="lf-submit-btn" style="background:#9040d0;border:none;color:#fff;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">Save</button>
        <button onclick="cancelEditLineup()" id="lf-cancel-btn" style="display:none;background:#333;border:none;color:#aaa;padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer">Cancel</button>
        <span id="lf-msg" style="font-size:12px;color:#888"></span>
      </div>
    </div>

    <!-- 최근 입력된 공방 일정 목록 -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:13px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.05em">Recent lineups</h3>
        <button onclick="document.getElementById('lf-form-wrap').style.display='';document.getElementById('lf-form-wrap').scrollIntoView({behavior:'smooth'})" style="background:#1e2a40;border:1px solid #2a4060;color:#80b0f0;padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer">+ Add New Lineup</button>
      </div>
      <div id="lineup-list" style="display:flex;flex-direction:column;gap:8px">
        <div style="color:#555;font-size:13px">Loading...</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ FEEDBACK TAB ═══════════════ -->
  <div id="tab-feedback" style="display:none">
    <div class="sec-hdr"><h2>User Feedback</h2></div>
    <div id="fb-summary" style="margin-bottom:16px;font-size:13px;color:#888"></div>
    <div id="fb-list"><div class="empty">Loading…</div></div>
  </div>


</div><!-- /content -->

<script>
const SUPA_URL = 'https://kzffotlfdtubkbxsjqiv.supabase.co';
const SUPA_KEY = 'sb_publishable__Qi94MjMjmOJRuotulyOZA_ftnVkHxL';

async function api(path, opts={}) {
  const {prefer, headers: extra, ...rest} = opts;
  const res = await fetch(`${SUPA_URL}/rest/v1/${path}`, {
    ...rest,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      ...(prefer !== undefined ? {'Prefer': prefer} : {'Prefer':'return=representation'}),
      ...(extra||{}),
    },
  });
  return res;
}


function displayNameForEvent(row) {
  return SHOW_LABELS_ADMIN[row.show_name] || row.show_name;
}

// 어드민에서 직접 입력한 공방 lineup: source='manual'
// 크롤링된 것: source='naver', 'imbc_api', 'youtube_api', 'date_rule' 등
function isManualSource(row) {
  return (row.source || 'manual') === 'manual';
}

// ── STATE ──
const TABS = ['calendar','lineups','feedback'];
let allEvents = [];
let calYear, calMonth;
let filterGroup = '';
let filterSrc = new Set(['naver','manual']);
let detailEvent = null;
let editingId = null;

const SC = {naver:'badge-crawl',manual:'badge-manual'};
const PC = {naver:'src-crawl',manual:'src-manual'};

// ── TABS ──
function showTab(name) {
  TABS.forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t===name ? 'block' : 'none';
    document.querySelectorAll('.tab')[TABS.indexOf(t)].classList.toggle('on', t===name);
  });
  if(name==='calendar')    renderCal();
  if(name==='lineups')     loadLineups(null);
  if(name==='feedback')    loadFeedback();
}

// ── 공방 일정 ──
const SHOW_LABELS_ADMIN = {
  music_core:    '🎵 Show! Music Core',
  inkigayo:      '🎵 Inkigayo',
  music_bank:    '🎵 Music Bank',
  mcountdown:    '🎵 M Countdown',
  show_champion: '🎵 Show Champion',
  the_show:      '🎵 The Show',
};
const SHOW_COLORS_ADMIN = {
  music_core:'#E8823A', inkigayo:'#A855C8', music_bank:'#4CAF50',
  mcountdown:'#FF4757', show_champion:'#00C4B4', the_show:'#6B94D6',
};
// index.html SHOW_LABELS와 동일하게 요일 스케줄 정의 (skeleton 생성용)
const SHOW_SCHEDULE = {
  music_core:    { day: 6 }, // SAT
  inkigayo:      { day: 0 }, // SUN
  music_bank:    { day: 5 }, // FRI
  mcountdown:    { day: 4 }, // THU
  show_champion: { day: 3 }, // WED
};

function scheduledShowForDateAdmin(dateStr) {
  const [y, mo, d] = dateStr.split('-').map(Number);
  const dow = new Date(y, mo - 1, d).getDay();
  const entry = Object.entries(SHOW_SCHEDULE).find(([, s]) => s.day === dow);
  if (!entry) return null;
  return entry[0]; // showName
}

function ensureFixedShowSkeletonsAdmin() {
  const today = new Date(); today.setHours(0,0,0,0);
  const byDate = {};
  allEvents.forEach(e => { byDate[e.broad_date] = true; });
  // today ~ 2 weeks ahead
  const end = new Date(today); end.setDate(end.getDate() + 14);
  const cur = new Date(today);
  while (cur <= end) {
    const ds = cur.toISOString().slice(0, 10);
    if (!byDate[ds]) {
      const showName = scheduledShowForDateAdmin(ds);
      if (showName) {
        allEvents.push({
          id: null,
          show_name: showName,
          broad_date: ds,
          episode_number: null,
          groups: [],
          raw_title: '',
          source: 'date_rule',
        });
      }
    }
    cur.setDate(cur.getDate() + 1);
  }
}

async function loadLineups(onDone) {
  const el = document.getElementById('lineup-list');
  el.innerHTML = '<div style="color:#555;font-size:13px">Loading...</div>';
  try {
    const res = await supaFetch('music_show_lineups?select=*&order=broad_date.desc&limit=50');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    const visibleRows = rows.filter(r => r.source !== 'cancelled' && r.source !== 'manual_event');
    if (!visibleRows.length) { el.innerHTML = '<div style="color:#555;font-size:13px">No data</div>'; return; }
    el.innerHTML = '';
    visibleRows.forEach(r => {
      const color = SHOW_COLORS_ADMIN[r.show_name] || '#9B6FD8';
      const label = SHOW_LABELS_ADMIN[r.show_name] || r.show_name;
      const sourceLabel = r.source === 'date_rule' ? 'TBA' : (r.source || '');
      const row = document.createElement('div');
      row.className = 'lrow';
      row.dataset.show = r.show_name;

async function loadAllEvents() {
  const statsEl = document.getElementById('topbar-stats');
  try {
    statsEl.textContent = 'Loading...';
    // 2026-03-01 고정 시작 ~ 3개월 후 (index.html과 동일 범위)
    const fromStr = '2026-03-01';
    const to = new Date(); to.setMonth(to.getMonth() + 3);
    const toStr = to.toISOString().slice(0, 10);
    const res = await fetch(
      `${SUPA_URL}/rest/v1/music_show_lineups?select=*&broad_date=gte.${fromStr}&broad_date=lte.${toStr}&order=broad_date.asc&limit=2000`,
      { headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Accept': 'application/json' } }
    );
    const text = await res.text();
    if (!res.ok) {
      statsEl.textContent = `API error ${res.status}: ${text.slice(0,100)}`;
      allEvents = []; return;
    }
    const data = JSON.parse(text);
    const rows = Array.isArray(data) ? data : [];

    // index.html과 동일하게: cancelled·manual_event·event_ 제외 후
    // 같은 날짜에 여러 row가 있으면 manual > naver > imbc/youtube > date_rule 우선순위로 1개만 선택
    const PRIORITY = { manual: 5, mbcplus: 4, naver: 3, imbc_api: 1, youtube_api: 1, imbc: 1, date_rule: 0 };
    const byDate = {};
    for (const r of rows) {
      if (r.source === 'cancelled') continue;
      if (r.source === 'manual_event') continue;
      if (String(r.show_name || '').startsWith('event_')) continue;
      const dk = (r.broad_date || '').slice(0, 10);
      if (!dk) continue;
      const existing = byDate[dk];
      const rPri = PRIORITY[r.source] ?? 0;
      const ePri = existing ? (PRIORITY[existing.source] ?? 0) : -1;
      if (!existing || rPri >= ePri) byDate[dk] = r;
    }
    allEvents = Object.values(byDate);
    ensureFixedShowSkeletonsAdmin();
    allEvents.sort((a, b) => a.broad_date < b.broad_date ? -1 : a.broad_date > b.broad_date ? 1 : 0);
  } catch(e) {
    document.getElementById('topbar-stats').textContent = `Fetch error: ${e.message}`;
    allEvents = [];
  }
}

function updateTopbar() {
  document.getElementById('topbar-stats').textContent =
    `Total ${allEvents.length} lineups`;
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOWS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function calMove(d) { calMonth += d; if(calMonth>11){calMonth=0;calYear++} if(calMonth<0){calMonth=11;calYear--} renderCal(); }

function filterGroupInput(val) {
  filterGroup = val.trim();
  renderCal();
}

function toggleFilter(type, val) {
  if(filterSrc.has(val)) filterSrc.delete(val); else filterSrc.add(val);
  const cls = val === 'naver' ? 'crawl' : val;
  document.querySelectorAll(`.fchip.${cls}`).forEach(el=>el.classList.toggle('on', filterSrc.has(val)));
  renderCal();
}

function visibleEvents() {
  const q = filterGroup.toLowerCase();
  if (!q) return allEvents;
  return allEvents.filter(e => {
    const inGroups = (e.groups||[]).some(g => g.toLowerCase().includes(q));
    const inRaw = (e.raw_title||'').toLowerCase().includes(q);
    return inGroups || inRaw;
  });
}

function renderCal() {
  document.getElementById('cal-label').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // DOW headers
  DOWS.forEach(d => {
    const el = document.createElement('div');
    el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });

  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInM  = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);

  const cells = [];
  for(let i=firstDow-1;i>=0;i--) cells.push({day:daysInPrev-i,mo:calMonth-1,yr:calMonth===0?calYear-1:calYear,other:true});
  for(let d=1;d<=daysInM;d++) cells.push({day:d,mo:calMonth,yr:calYear,other:false});
  while(cells.length<42) { const l=cells[cells.length-1]; cells.push({day:l.day+1-(l.other&&l.mo>calMonth?0:0),mo:calMonth+1,yr:calMonth===11?calYear+1:calYear,other:true}); }
  // fix overflow days
  let od=1;
  cells.forEach((c,i)=>{ if(i>=firstDow+daysInM){ c.day=od++;c.other=true; }});

  const evts = visibleEvents();

  cells.forEach(c => {
    const dateStr = `${c.yr}-${String(c.mo+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
    const cellDate = new Date(c.yr, c.mo, c.day);
    const isToday  = cellDate.getTime()===today.getTime();
    const dayEvts  = evts.filter(e => e.broad_date===dateStr);

    const cell = document.createElement('div');
    cell.className = ['cal-cell', c.other?'other':'', isToday?'today':''].filter(Boolean).join(' ');

    const num = document.createElement('div');
    num.className = 'cal-num';
    num.textContent = c.day;
    if(isToday) { const w=document.createElement('div');w.textContent=c.day;num.textContent='';num.appendChild(w); }
    cell.appendChild(num);

    const MAX_PILLS = 3;
    dayEvts.slice(0, MAX_PILLS).forEach(e => {
      const pill = document.createElement('div');
      const isSkeleton = e.source === 'date_rule' && !e.id;
      const isCrawled = !isSkeleton && !isManualSource(e);
      if (isSkeleton) {
        pill.className = 'cal-pill src-pending';
      } else {
        pill.className = `cal-pill ${isCrawled ? 'src-crawl' : 'src-manual'}`;
      }
      const showColor = SHOW_COLORS_ADMIN[e.show_name];
      if (showColor) pill.style.borderLeft = `3px solid ${showColor}`;
      const fullLabel = displayNameForEvent(e);
      const shortName = fullLabel.replace(/🎵 /, '').replace(/^Show!\s*/, '').replace(/^SBS\s*/, '');
      const artistCount = (e.groups||[]).length;
      pill.textContent = isSkeleton ? shortName : (artistCount ? `${shortName} (${artistCount})` : shortName);
      const titleArtists = e.raw_title
        ? e.raw_title.replace(/^[^-]+-\s*/, '').slice(0, 80)
        : (e.groups||[]).join(', ').slice(0, 80);
      const srcLabel = isSkeleton ? 'TBA' : isCrawled ? 'Crawled' : 'Direct input';
      pill.title = `[${srcLabel}] ${fullLabel}\n${titleArtists || '라인업 미정'}`;
      pill.onclick = () => openDetail(e);
      cell.appendChild(pill);
    });
    if(dayEvts.length > MAX_PILLS) {
      const more = document.createElement('div');
      more.className='cal-more';
      more.textContent=`+${dayEvts.length - MAX_PILLS} more`;
      more.onclick = () => openDetail(dayEvts[MAX_PILLS]);
      cell.appendChild(more);
    }
    grid.appendChild(cell);
  });
}

// ── FEEDBACK ──
async function loadFeedback() {
  const el = document.getElementById('fb-list');
  el.innerHTML='<div class="empty">Loading…</div>';
  const res = await api('feedbacks?select=*&order=created_at.desc', {prefer:''});
  if(!res.ok){ el.innerHTML=`<div class="empty" style="color:#f08080">Error ${res.status}: check the feedbacks table.</div>`; return; }
  const rows = await res.json();
  if(!Array.isArray(rows)||!rows.length){ el.innerHTML='<div class="empty">No feedback yet.</div>'; return; }

  // summary
  const avg = (rows.reduce((s,r)=>s+(r.rating||0),0)/rows.length).toFixed(1);
  const dist = [1,2,3,4,5].map(n=>rows.filter(r=>r.rating===n).length);
  document.getElementById('fb-summary').innerHTML =
    `<strong style="font-size:22px;color:#f0b040">${avg}</strong> / 5 &nbsp; (${rows.length} responses) &nbsp;
     ${[5,4,3,2,1].map(n=>`★${n}: ${dist[n-1]}`).join(' · ')}`;

  // 1-year filter
  const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-1);
  el.innerHTML='';
  rows.filter(r=>new Date(r.created_at)>cutoff).forEach(r => {
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="card-row">
        <div class="card-info">
          <div class="stars">${'★'.repeat(r.rating||0)}${'☆'.repeat(5-(r.rating||0))}</div>
          <div style="margin-top:6px;font-size:13px;color:#ccc;white-space:pre-wrap">${r.message||'<em style="color:#555">No message</em>'}</div>
          <div class="card-meta" style="margin-top:6px">${new Date(r.created_at).toLocaleString()}</div>
        </div>
      </div>
    `;
    el.appendChild(card);
  });
}
